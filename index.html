<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Sentence Comprehension with Digit Memory (Final)</title>
  <script src="https://unpkg.com/jspsych@7.3.4/dist/index.browser.min.js"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-survey-html-form@1.0.2"></script>
  <script src="https://unpkg.com/@jspsych/plugin-call-function@1.1.1"></script>
  <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet">
  <style>
    body, .jspsych-display-element, .instruction-text, .consent-text, p, h1, h2, h3, h4 { line-height: 1.5 !important; }
    .fixation { font-size: 56px; text-align: center; margin-top: 35vh; color: #2c3e66; }
    .feedback-correct { color: #2a7f2a; font-size: 36px; font-weight: bold; text-align: center; margin-top: 40vh; }
    .feedback-incorrect { color: #b13b3b; font-size: 36px; font-weight: bold; text-align: center; margin-top: 40vh; }
    .feedback-digit { color: #1e5f8e; font-size: 28px; font-weight: bold; text-align: center; margin-top: 40vh; }
    .counter { position: fixed; top: 18px; right: 24px; background-color: #1e3a5f; color: white; padding: 8px 16px; border-radius: 40px; font-size: 15px; font-weight: 600; z-index: 10000; pointer-events: none; }
    
    .demographics-compact {
      max-width: 1000px;
      margin: 0 auto;
      background: #f9f9f9;
      padding: 15px 20px;
      border-radius: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px 25px;
    }
    .form-group { display: flex; flex-direction: column; margin-bottom: 8px; }
    .form-group label { font-weight: bold; font-size: 14px; margin-bottom: 4px; color: #333; }
    .form-group input, .form-group select { padding: 6px 8px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; }
    .checkbox-group { display: grid; grid-template-columns: repeat(2, 1fr); gap: 5px 10px; margin-top: 4px; }
    .checkbox-group label { font-weight: normal; font-size: 13px; white-space: nowrap; }
    .other-specify { margin-top: 8px; display: flex; align-items: center; gap: 8px; }
    .other-specify input { flex: 1; }
    .full-width { grid-column: span 2; }
    @media (max-width: 700px) {
      .demographics-compact { grid-template-columns: 1fr; gap: 10px; }
      .full-width { grid-column: span 1; }
    }

    .digit-memory { font-size: 82px; font-weight: 700; letter-spacing: 18px; font-family: monospace; color: #1e3a5f; background: #fff4df; padding: 20px 40px; border-radius: 60px; display: inline-block; }
    .digit-label { font-size: 28px; margin-bottom: 20px; color: #4b6f8e; }
    .recall-input { font-size: 48px; text-align: center; width: 250px; padding: 15px; border-radius: 20px; border: 2px solid #ccc; font-family: monospace; letter-spacing: 8px; }
    
    .instruction-text { font-size: 26px; max-width: 900px; margin: 0 auto; text-align: center; }
    .consent-text { font-size: 20px; max-width: 800px; margin: 0 auto; }
    
    .consent-card {
      max-width: 750px;
      margin: 20px auto;
      background: #ffffff;
      border-radius: 24px;
      padding: 24px 32px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      text-align: left;
      font-size: 16px;
      line-height: 1.5;
      max-height: 85vh;
      overflow-y: auto;
    }
    .consent-card h3 {
      text-align: center;
      margin-top: 0;
      margin-bottom: 16px;
      font-size: 1.6rem;
    }
    .consent-card p {
      margin-bottom: 12px;
    }
    .consent-card ul {
      margin: 8px 0;
      padding-left: 20px;
    }
    .consent-card .highlight {
      background-color: #f0f7ff;
      padding: 8px 12px;
      border-radius: 12px;
      font-weight: 500;
    }
    .consent-card .agreement {
      text-align: center;
      margin-top: 20px;
      font-weight: bold;
      font-size: 1.2rem;
    }
    .btn-prompt {
      font-family: monospace;
      background: #e9ecef;
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-weight: bold;
    }
    .warning-box {
      background-color: #fff3cd;
      border: 2px solid #ffeeba;
      border-radius: 16px;
      padding: 20px;
      margin: 30px auto;
      max-width: 600px;
      text-align: center;
      color: #856404;
      font-size: 20px;
    }
  </style>
</head>
<body>
<div id="loading" style="text-align:center; margin-top:50px;">Loading experiment...</div>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("loading").style.display = "none";

    // ==================== MOBILE DETECTION ====================
    function isMobilePhone() {
      const hasTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
      const mobileUA = /Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
      const isSmallScreen = window.innerWidth <= 768;
      const isTablet = /iPad|Android(?!.*Mobile)/i.test(navigator.userAgent);
      return (mobileUA || isTablet) && (hasTouch || isSmallScreen);
    }
    if (isMobilePhone()) {
      alert("This experiment requires a physical keyboard (laptop or desktop computer). Please switch to a computer with a keyboard.");
      document.body.innerHTML = '<div style="text-align:center; margin-top:50px;"><h2>Device not supported</h2><p>This experiment requires a physical keyboard. Please use a laptop or desktop computer.</p></div>';
      throw new Error("Mobile phone/tablet blocked");
    }
    if (('ontouchstart' in window) && !isMobilePhone()) {
      const warnDiv = document.createElement('div');
      warnDiv.className = 'warning-box';
      warnDiv.innerHTML = '<strong>⚠️ Note</strong><br>You are using a touchscreen device. Please ensure you use the physical keyboard to press C and M keys.<br><br>Press SPACE to continue.';
      document.body.prepend(warnDiv);
      document.addEventListener('keydown', function removeWarn() {
        if (warnDiv.parentNode) warnDiv.remove();
        document.removeEventListener('keydown', removeWarn);
      });
    }

    // ==================== COUNTERBALANCING ====================
    let blockOrder = Math.random() < 0.5 ? 'baseline_first' : 'dual_first';
    let setAssignment = Math.random() < 0.5 ? 'normal' : 'swapped';
    let listType = Math.random() < 0.5 ? 'A' : 'B';
    let keyMapping = Math.random() < 0.5 ? 'original' : 'swapped';
    
    console.log(`blockOrder=${blockOrder}, setAssignment=${setAssignment}, listType=${listType}, keys=${keyMapping}`);

    const totalQuestions = 4 + 4 + 84;
    let questionsAnswered = 0;
    let counterDiv = null;
    function createCounter() { counterDiv = document.createElement('div'); counterDiv.className = 'counter'; counterDiv.textContent = `Progress: 0 / ${totalQuestions}`; document.body.appendChild(counterDiv); }
    function updateCounter() { if (counterDiv) counterDiv.textContent = `Progress: ${questionsAnswered} / ${totalQuestions}`; }
    function incrementCounter() { questionsAnswered++; updateCounter(); }

    const autoParticipantID = `auto_${Date.now()}_${Math.floor(Math.random() * 10000)}`;
    const GOOGLE_SHEETS_URL = "https://script.google.com/macros/s/AKfycbx-KkNp_g4rJ5ikUH0YSlGUH2Q43ULOpWobQ5ZR_FCNlY8H84nRRW8o1EG9IezXOpo/exec";
    function sendToGoogleSheets(dataRow) {
      fetch(GOOGLE_SHEETS_URL, { method: "POST", mode: "no-cors", headers: { "Content-Type": "application/json" }, body: JSON.stringify(dataRow) })
        .catch(err => console.error("Send error:", err));
    }

    // ==================== STIMULI ====================
    const practiceTrials = [
      { sentence: "The manager of the employees who was reading a book stayed late.", question: "Who was reading a book? FIRST noun (manager) or SECOND noun (employees)?", correct: "NP1" },
      { sentence: "The supervisor of the workers who were arguing in the hallway called security.", question: "Who was arguing in the hallway? FIRST noun (supervisor) or SECOND noun (workers)?", correct: "NP2" },
      { sentence: "The baker who baked the bread won an award.", question: "Who baked the bread? FIRST noun (baker) or SECOND noun (bread)?", correct: "NP1" },
      { sentence: "The cat chased the mouse that was hiding under the couch.", question: "What was hiding under the couch? FIRST noun (cat) or SECOND noun (mouse)?", correct: "NP2" }
    ];

    // ----- 32 Experimental Pairs -----
    const rawPairs = [
      ["The girl asked the driver of the players who was talking to an old woman.", "The girl asked the driver of the players who were talking to an old woman.", "Who was talking to an old woman? FIRST noun (driver) or SECOND noun (players)?", "NP1", "NP2"],
      ["The father of the kids who found himself broke lost his job.", "The father of the kids who found themselves broke lost his job.", "Who was broke? FIRST noun (father) or SECOND noun (kids)?", "NP1", "NP2"],
      ["The chairman of the writers who calls himself a wealthy person signed the contract.", "The chairman of the writers who call themselves wealthy persons signed the contract.", "Who was a wealthy person? FIRST noun (chairman) or SECOND noun (writers)?", "NP1", "NP2"],
      ["The cousins of Jane who were living in the U.S. visited us this weekend.", "The cousins of Jane who was living in the U.S. visited us this weekend.", "Who was living in the U.S.? FIRST noun (cousins) or SECOND noun (Jane)?", "NP1", "NP2"],
      ["The pilot of the travelers who was resting complained about the weather.", "The pilot of the travelers who were resting complained about the weather.", "Who was resting? FIRST noun (pilot) or SECOND noun (travelers)?", "NP1", "NP2"],
      ["Emma met the sister of the boys who was enjoying playing by the river.", "Emma met the sister of the boys who were enjoying playing by the river.", "Who was enjoying playing by the river? FIRST noun (sister) or SECOND noun (boys)?", "NP1", "NP2"],
      ["The doctor examined the mother of the boy who had injured herself with the knife.", "The doctor examined the mother of the boy who had injured himself with the knife.", "Who was injured with the knife? FIRST noun (mother) or SECOND noun (boy)?", "NP1", "NP2"],
      ["The director praised the teacher of the students who was writing the reports.", "The director praised the teacher of the students who were writing the reports.", "Who was writing the reports? FIRST noun (teacher) or SECOND noun (students)?", "NP1", "NP2"],
      ["The crowd welcomed the daughter of Mr. Bill who introduced herself to the team.", "The crowd welcomed the daughter of Mr. Bill who introduced himself to the team.", "Who introduced themselves to the team? FIRST noun (daughter) or SECOND noun (Mr. Bill)?", "NP1", "NP2"],
      ["The uncle of the waitress who washed himself in the kitchen lost his key.", "The uncle of the waitress who washed herself in the kitchen lost his key.", "Who washed in the kitchen? FIRST noun (uncle) or SECOND noun (waitress)?", "NP1", "NP2"],
      ["The director of the actors who was wearing a hat enjoyed the show.", "The director of the actors who were wearing hats enjoyed the show.", "Who was wearing a hat? FIRST noun (director) or SECOND noun (actors)?", "NP1", "NP2"],
      ["Mary met the daughter of the man who herself had a car accident.", "Mary met the daughter of the man who himself had a car accident.", "Who had a car accident? FIRST noun (daughter) or SECOND noun (man)?", "NP1", "NP2"],
      ["The man called the assistant of the employees who were on the phone.", "The man called the assistant of the employees who was on the phone.", "Who was on the phone? FIRST noun (assistant) or SECOND noun (employees)?", "NP2", "NP1"],
      ["The lawyer of the criminals who were in the courtroom failed to escape.", "The lawyer of the criminals who was in the courtroom failed to escape.", "Who was in the courtroom? FIRST noun (lawyer) or SECOND noun (criminals)?", "NP2", "NP1"],
      ["The restaurant hired the chefs of the prince who proved himself to be wealthy.", "The restaurant hired the chefs of the prince who proved themselves to be wealthy.", "Who proved to be wealthy? FIRST noun (chefs) or SECOND noun (prince)?", "NP2", "NP1"],
      ["The friends of the artist who was living abroad came yesterday to the party.", "The friends of the artist who were living abroad came yesterday to the party.", "Who was living abroad? FIRST noun (friends) or SECOND noun (artist)?", "NP2", "NP1"],
      ["The journalist ignored the ministers of the president who was waving at the crowd.", "The journalist ignored the ministers of the president who were waving at the crowd.", "Who was waving at the crowd? FIRST noun (ministers) or SECOND noun (president)?", "NP2", "NP1"],
      ["The aunt of the boy who had locked himself in the bedroom visited us today.", "The aunt of the boy who had locked herself in the bedroom visited us today.", "Who was locked in the bedroom? FIRST noun (aunt) or SECOND noun (boy)?", "NP2", "NP1"],
      ["I saw the fans of the celebrity who himself refused to leave the building.", "I saw the fans of the celebrity who themselves refused to leave the building.", "Who refused to leave the building? FIRST noun (fans) or SECOND noun (celebrity)?", "NP2", "NP1"],
      ["The sisters of the hairdresser who was living nearby will move to another city.", "The sisters of the hairdresser who were living nearby will move to another city.", "Who was living nearby? FIRST noun (sisters) or SECOND noun (hairdresser)?", "NP2", "NP1"],
      ["John met the husband of the chairwoman who stayed by herself in the office.", "John met the husband of the chairwoman who stayed by himself in the office.", "Who stayed in the office? FIRST noun (husband) or SECOND noun (chairwoman)?", "NP2", "NP1"],
      ["The wife of the neighbour who promised himself to work hard came today.", "The wife of the neighbour who promised herself to work hard came today.", "Who promised to work hard? FIRST noun (wife) or SECOND noun (neighbour)?", "NP2", "NP1"],
      ["The lawyer of the woman who tried to drown herself in the river retired.", "The lawyer of the woman who tried to drown himself in the river retired.", "Who tried to drown in the river? FIRST noun (lawyer) or SECOND noun (woman)?", "NP2", "NP1"],
      ["The colleagues of the inspector who was looking serious agreed to a meeting soon.", "The colleagues of the inspector who were looking serious agreed to a meeting soon.", "Who was looking serious? FIRST noun (colleagues) or SECOND noun (inspector)?", "NP2", "NP1"],
      ["The leader of the scouts who was carrying a heavy pack stopped to rest.", "The leader of the scouts who were carrying a heavy pack stopped to rest.", "Who was carrying a heavy pack? FIRST noun (leader) or SECOND noun (scouts)?", "NP1", "NP2"],
      ["The advisor of the students who was preparing the presentation left early.", "The advisor of the students who were preparing the presentation left early.", "Who was preparing the presentation? FIRST noun (advisor) or SECOND noun (students)?", "NP1", "NP2"],
      ["The captain of the sailors who was not feeling well went below deck.", "The captain of the sailors who were not feeling well went below deck.", "Who was not feeling well? FIRST noun (captain) or SECOND noun (sailors)?", "NP1", "NP2"],
      ["The uncle of the twins who was living in London sent a gift.", "The uncle of the twins who were living in London sent a gift.", "Who was living in London? FIRST noun (uncle) or SECOND noun (twins)?", "NP1", "NP2"],
      ["The daughter of the teachers who bought herself a new bike was happy.", "The daughter of the teachers who bought themselves a new bike was happy.", "Who bought a new bike? FIRST noun (daughter) or SECOND noun (teachers)?", "NP1", "NP2"],
      ["The brother of the friends who challenged himself to run faster won the race.", "The brother of the friends who challenged themselves to run faster won the race.", "Who challenged themselves to run faster? FIRST noun (brother) or SECOND noun (friends)?", "NP1", "NP2"],
      ["The guest of the lawyers who introduced himself at the party was very polite.", "The guest of the lawyers who introduced themselves at the party was very polite.", "Who introduced themselves at the party? FIRST noun (guest) or SECOND noun (lawyers)?", "NP1", "NP2"],
      ["The witness of the drivers who bought herself a coffee waited for the police.", "The witness of the drivers who bought themselves a coffee waited for the police.", "Who bought coffee? FIRST noun (witness) or SECOND noun (drivers)?", "NP1", "NP2"]
    ];

    // Build experimental items based on listType
    const experimentalItems = [];
    for (let i = 0; i < rawPairs.length; i++) {
      const [ha, la, q, correctHA, correctLA] = rawPairs[i];
      let sentence, correct;
      if (listType === 'A') {
        if (i < 16) { sentence = ha; correct = correctHA; }
        else { sentence = la; correct = correctLA; }
      } else {
        if (i < 16) { sentence = la; correct = correctLA; }
        else { sentence = ha; correct = correctHA; }
      }
      experimentalItems.push({ sentence, question: q, correct, type: 'pair' });
    }

    // ----- 32 Ambiguous Items -----
    const ambiguousRaw = [
      ["Someone shot the servant of the actress who was on the balcony.", "Who was on the balcony? FIRST noun (servant) or SECOND noun (actress)?"],
      ["The brother of the teacher who was tired went home.", "Who was tired? FIRST noun (brother) or SECOND noun (teacher)?"],
      ["The son of the guest who was nervous spoke.", "Who was nervous? FIRST noun (son) or SECOND noun (guest)?"],
      ["The partner of the director who was late apologized.", "Who was late? FIRST noun (partner) or SECOND noun (director)?"],
      ["The teammate of the student who was hardworking arrived.", "Who was hardworking? FIRST noun (teammate) or SECOND noun (student)?"],
      ["I talked to the manager of the writer who was holding a bag.", "Who was holding a bag? FIRST noun (manager) or SECOND noun (writer)?"],
      ["The neighbor of the doctor who was rich moved away.", "Who was rich? FIRST noun (neighbor) or SECOND noun (doctor)?"],
      ["The cousin of the athlete who was travelling rested.", "Who was travelling? FIRST noun (cousin) or SECOND noun (athlete)?"],
      ["The colleague of the manager who was promoted celebrated.", "Who was promoted? FIRST noun (colleague) or SECOND noun (manager)?"],
      ["The friend of the student who was absent called.", "Who was absent? FIRST noun (friend) or SECOND noun (student)?"],
      ["The friend of the person who lost the key finally found it.", "Who lost the key? FIRST noun (friend) or SECOND noun (person)?"],
      ["The brother of the actor who was at the party arrived early.", "Who was at the party? FIRST noun (brother) or SECOND noun (actor)?"],
      ["The secretary of the boss who was waiting looked anxious.", "Who was waiting? FIRST noun (secretary) or SECOND noun (boss)?"],
      ["The mother of the child who was playing looked happy.", "Who was playing? FIRST noun (mother) or SECOND noun (child)?"],
      ["The assistant of the professor who was grading exams stayed late.", "Who was grading exams? FIRST noun (assistant) or SECOND noun (professor)?"],
      ["The nurse of the doctor who was checking the patient left the room quickly.", "Who was checking the patient? FIRST noun (nurse) or SECOND noun (doctor)?"],
      ["The editor of the journalist who was nominated received a prize.", "Who was nominated? FIRST noun (editor) or SECOND noun (journalist)?"],
      ["The coach of the athlete who was training for the Olympics felt proud.", "Who was training for the Olympics? FIRST noun (coach) or SECOND noun (athlete)?"],
      ["The employee of the manager who was attending the meeting arrived on time.", "Who was attending the meeting? FIRST noun (employee) or SECOND noun (manager)?"],
      ["The teacher of the student who was waiting in the hall called home.", "Who was waiting in the hall? FIRST noun (teacher) or SECOND noun (student)?"],
      ["The assistant of the manager who was typing a report left early.", "Who was typing a report? FIRST noun (assistant) or SECOND noun (manager)?"],
      ["The friend of the neighbor who was walking the dog waved hello.", "Who was walking the dog? FIRST noun (friend) or SECOND noun (neighbor)?"],
      ["The son of the politician who was looking at his watch felt nervous.", "Who was looking at his watch? FIRST noun (son) or SECOND noun (politician)?"],
      ["The cousin of the artist who was drinking coffee arrived late.", "Who was drinking coffee? FIRST noun (cousin) or SECOND noun (artist)?"],
      ["The driver of the passenger who was looking at the map missed the turn.", "Who was looking at the map? FIRST noun (driver) or SECOND noun (passenger)?"],
      ["The friend of the visitor who was sitting on the porch looked tired.", "Who was sitting on the porch? FIRST noun (friend) or SECOND noun (visitor)?"],
      ["The relative of the guest who was cooking in the kitchen worked quickly.", "Who was cooking in the kitchen? FIRST noun (relative) or SECOND noun (guest)?"],
      ["The daughter of the neighbor who was eating a cookie smiled.", "Who was eating a cookie? FIRST noun (daughter) or SECOND noun (neighbor)?"],
      ["The representative of the client who was signing the document seemed pleased.", "Who was signing the document? FIRST noun (representative) or SECOND noun (client)?"],
      ["The brother of the guest who was waiting for a call felt nervous.", "Who was waiting for a call? FIRST noun (brother) or SECOND noun (guest)?"],
      ["The supervisor of the colleague who was fixing the computer stayed late.", "Who was fixing the computer? FIRST noun (supervisor) or SECOND noun (colleague)?"],
      ["The nephew of the neighbor who was painting the mural arrived at noon.", "Who was painting the mural? FIRST noun (nephew) or SECOND noun (neighbor)?"]
    ];
    const ambiguousItems = ambiguousRaw.map(([s, q]) => ({ sentence: s, question: q, correct: null, type: 'ambiguous' }));

    // ----- 20 Fillers -----
    const fillerRaw = [
      ["The teacher scolded the student who was late for class.", "Who was late for class? FIRST noun (teacher) or SECOND noun (student)?", "NP2"],
      ["The dog chased the cat that ran into the garden.", "Who ran into the garden? FIRST noun (dog) or SECOND noun (cat)?", "NP2"],
      ["The policeman helped the old woman who had lost her wallet.", "Who lost her wallet? FIRST noun (policeman) or SECOND noun (woman)?", "NP2"],
      ["The chef tasted the soup that was too salty.", "What was too salty? FIRST noun (chef) or SECOND noun (soup)?", "NP2"],
      ["The child hugged the grandmother who was crying.", "Who was crying? FIRST noun (child) or SECOND noun (grandmother)?", "NP2"],
      ["The painter admired the landscape that reminded him of home.", "What reminded him of home? FIRST noun (painter) or SECOND noun (landscape)?", "NP2"],
      ["The customer complained to the cashier who made a mistake.", "Who made a mistake? FIRST noun (customer) or SECOND noun (cashier)?", "NP2"],
      ["The bird ate the worm that was wriggling on the ground.", "What was wriggling on the ground? FIRST noun (bird) or SECOND noun (worm)?", "NP2"],
      ["The officer stopped the driver who ran a red light.", "Who ran a red light? FIRST noun (officer) or SECOND noun (driver)?", "NP2"],
      ["The nurse called the patient who was feeling dizzy.", "Who was feeling dizzy? FIRST noun (nurse) or SECOND noun (patient)?", "NP2"],
      ["The gardener watered the flowers that were wilting in the sun.", "What were wilting in the sun? FIRST noun (gardener) or SECOND noun (flowers)?", "NP2"],
      ["The singer thanked the guitarist who played a beautiful solo.", "Who played a beautiful solo? FIRST noun (singer) or SECOND noun (guitarist)?", "NP2"],
      ["The cat watched the mouse that stole some cheese.", "Who stole some cheese? FIRST noun (cat) or SECOND noun (mouse)?", "NP2"],
      ["The father carried the daughter who was too tired to walk.", "Who was too tired to walk? FIRST noun (father) or SECOND noun (daughter)?", "NP2"],
      ["The driver avoided the cyclist who swerved suddenly.", "Who swerved suddenly? FIRST noun (driver) or SECOND noun (cyclist)?", "NP2"],
      ["The baker sold the bread that was freshly baked.", "What was freshly baked? FIRST noun (baker) or SECOND noun (bread)?", "NP2"],
      ["The journalist interviewed the politician who had just won the election.", "Who had just won the election? FIRST noun (journalist) or SECOND noun (politician)?", "NP2"],
      ["The child kicked the ball that rolled into the street.", "What rolled into the street? FIRST noun (child) or SECOND noun (ball)?", "NP2"],
      ["The waiter served the couple who ordered the special dish.", "Who ordered the special dish? FIRST noun (waiter) or SECOND noun (couple)?", "NP2"],
      ["The neighbor heard the noise that came from the basement.", "What came from the basement? FIRST noun (neighbor) or SECOND noun (noise)?", "NP2"]
    ];
    const fillers = fillerRaw.map(([s, q, c]) => ({ sentence: s, question: q, correct: c, type: 'filler' }));

    // ==================== CATCH TRIALS ====================
    const catchTrialsPool = [
      { sentence: "The sky is green.", question: "Is this statement true? Press C for Yes, M for No.", correct: "NP2", type: 'catch' },
      { sentence: "Water is wet.", question: "Is this statement true? Press C for Yes, M for No.", correct: "NP1", type: 'catch' },
      { sentence: "February has 30 days.", question: "Is this statement true? Press C for Yes, M for No.", correct: "NP2", type: 'catch' },
      { sentence: "The Earth orbits the Sun.", question: "Is this statement true? Press C for Yes, M for No.", correct: "NP1", type: 'catch' }
    ];
    const baselineCatch = [catchTrialsPool[0]];
    const dualCatch = [catchTrialsPool[1], catchTrialsPool[2]];

    // ==================== CREATE TWO MATCHED SETS ====================
    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    const shuffledExp = shuffle([...experimentalItems]);
    const expSet1 = shuffledExp.slice(0, 16);
    const expSet2 = shuffledExp.slice(16, 32);
    
    const shuffledAmbig = shuffle([...ambiguousItems]);
    const ambigSet1 = shuffledAmbig.slice(0, 16);
    const ambigSet2 = shuffledAmbig.slice(16, 32);
    
    const shuffledFillers = shuffle([...fillers]);
    const fillerSet1 = shuffledFillers.slice(0, 10);
    const fillerSet2 = shuffledFillers.slice(10, 20);
    
    const completeSet1 = shuffle([...expSet1, ...ambigSet1, ...fillerSet1]);
    const completeSet2 = shuffle([...expSet2, ...ambigSet2, ...fillerSet2]);
    
    let baselineSetRaw, dualSetRaw;
    if (setAssignment === 'normal') {
      baselineSetRaw = [...completeSet1];
      dualSetRaw = [...completeSet2];
    } else {
      baselineSetRaw = [...completeSet2];
      dualSetRaw = [...completeSet1];
    }
    
    function insertCatchTrials(itemArray, catchTrials, positions) {
      const result = [...itemArray];
      for (let i = positions.length - 1; i >= 0; i--) {
        const idx = positions[i];
        if (idx >= 0 && idx <= result.length) {
          result.splice(idx, 0, catchTrials[i]);
        }
      }
      return result;
    }
    
    const baselineSet = insertCatchTrials(baselineSetRaw, baselineCatch, [20]);
    const dualSet = insertCatchTrials(dualSetRaw, dualCatch, [14, 28]);
    
    // ==================== DIGIT SEQUENCES (60) ====================
    const digitSequences = [
      [2,5,7,1], [4,9,3,6], [8,1,4,2], [7,3,9,5], [6,2,8,4], [1,7,4,9], [3,8,2,6], [5,1,9,3], [9,4,6,2], [2,8,5,7],
      [3,5,1,8], [6,9,2,4], [7,1,5,3], [4,2,9,7], [8,6,3,1], [9,3,7,4], [1,5,8,2], [2,7,4,6], [5,9,3,8], [6,1,7,9],
      [8,4,1,5], [3,9,6,2], [7,5,2,9], [1,8,3,6], [4,7,9,2], [2,4,8,3], [6,3,5,9], [9,1,2,5], [5,8,7,4], [3,6,1,7],
      [7,9,4,1], [8,2,5,6], [4,5,6,9], [1,3,9,8], [6,8,2,5], [9,5,3,2], [2,6,7,8], [5,4,1,6], [7,8,9,3], [3,1,6,4],
      [9,7,5,8], [4,8,3,7], [6,4,9,1], [1,2,8,9], [5,3,4,7], [8,9,2,4], [7,6,1,3], [2,9,5,6], [3,4,8,5], [1,6,9,7],
      [9,8,4,5], [5,7,6,2], [4,1,3,8], [6,5,9,7], [2,3,1,9], [8,7,5,9], [3,6,2,4], [7,4,8,6], [1,9,6,5], [5,2,8,3]
    ];
    function shuffleDigits(arr) { let copy = [...arr]; for (let i = copy.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [copy[i], copy[j]] = [copy[j], copy[i]]; } return copy; }

    // ==================== TRIAL COMPONENTS (CORRECTED LOGGING) ====================
    function makeBaselineComponents(item, trialNum, block, isPractice = false) {
      const fix = { type: jsPsychHtmlKeyboardResponse, stimulus: '<div class="fixation">+</div>', trial_duration: 500, choices: "NO_KEYS", data: { trial_type: 'fixation' } };
      const sent = { type: jsPsychHtmlKeyboardResponse, stimulus: `<div style="font-size:36px; text-align:center; line-height:1.4;">${item.sentence}</div>`, trial_duration: 5000, choices: "NO_KEYS", data: { trial_type: 'sentence' } };
      const ques = {
        type: jsPsychHtmlKeyboardResponse,
        stimulus: `<div style="font-size:32px; text-align:center; line-height:1.4;">${item.question}</div>`,
        choices: ['c', 'm'],
        prompt: () => (keyMapping === 'original') ? '<p style="font-size:24px; line-height:1.4;">🔹 C = FIRST noun &nbsp;&nbsp; 🔹 M = SECOND noun</p>' : '<p style="font-size:24px; line-height:1.4;">🔹 C = SECOND noun &nbsp;&nbsp; 🔹 M = FIRST noun</p>',
        on_finish: (data) => {
          let resp = data.response === 'c' ? 'NP1' : 'NP2';
          if (keyMapping === 'swapped') resp = resp === 'NP1' ? 'NP2' : 'NP1';
          const corr = (item.correct !== null) ? (resp === item.correct) : null;
          const demo = jsPsych.data.get().values().find(d => d.participant) || {};
          const tdata = {
            participant: demo.participant || '',
            auto_participant_id: autoParticipantID,
            age: demo.age || '',
            gender: demo.gender || '',
            education: demo.education || '',
            handedness: demo.handedness || '',
            native_language: demo.native_language || '',
            other_languages: demo.other_languages || '',
            list_type: listType,
            key_mapping: keyMapping,
            block_order: blockOrder,
            set_assignment: setAssignment,
            block: block,
            trial_num: trialNum,
            sentence: item.sentence,
            question: item.question,
            correct_answer: item.correct,
            response: resp,
            accuracy: corr,
            is_dual_task: false,
            rt_from_question: data.rt,
            item_type: item.type || 'main'
          };
          sendToGoogleSheets(tdata);
          incrementCounter();
          if (isPractice) window.lastPractice = { correct: corr, correctAnswer: item.correct };
        }
      };
      const blank = { type: jsPsychHtmlKeyboardResponse, stimulus: '<div></div>', trial_duration: 300, choices: "NO_KEYS", data: { trial_type: 'iti' } };
      return [fix, sent, ques, blank];
    }
    
    function makeDualComponents(item, trialNum, block, digitPool, usedSet, isPractice = false) {
      let currentDigits = null;
      let comprehensionData = null;
      
      const digPres = {
        type: jsPsychHtmlKeyboardResponse,
        stimulus: () => {
          let avail = digitPool.filter(s => !usedSet.has(JSON.stringify(s)));
          if (avail.length === 0) { usedSet.clear(); currentDigits = digitPool[Math.floor(Math.random() * digitPool.length)]; }
          else { currentDigits = avail[Math.floor(Math.random() * avail.length)]; }
          usedSet.add(JSON.stringify(currentDigits));
          return `<div style="text-align:center; margin-top:22vh;"><div class="digit-label">🔢 Remember these digits</div><div class="digit-memory">${currentDigits.join(' ')}</div></div>`;
        },
        trial_duration: 2000,
        choices: "NO_KEYS",
        data: { trial_type: 'digit_presentation', digit_sequence: () => currentDigits ? currentDigits.join('') : '' }
      };
      const blank1 = { type: jsPsychHtmlKeyboardResponse, stimulus: '<div></div>', trial_duration: 500, choices: "NO_KEYS" };
      const fix = { type: jsPsychHtmlKeyboardResponse, stimulus: '<div class="fixation">+</div>', trial_duration: 500, choices: "NO_KEYS" };
      const sent = { type: jsPsychHtmlKeyboardResponse, stimulus: `<div style="font-size:36px; text-align:center; line-height:1.4;">${item.sentence}</div>`, trial_duration: 5000, choices: "NO_KEYS", data: { trial_type: 'sentence' } };
      
      const ques = {
        type: jsPsychHtmlKeyboardResponse,
        stimulus: `<div style="font-size:32px; text-align:center; line-height:1.4;">${item.question}</div>`,
        choices: ['c', 'm'],
        prompt: () => (keyMapping === 'original') ? '<p style="font-size:24px; line-height:1.4;">🔹 C = FIRST noun &nbsp;&nbsp; 🔹 M = SECOND noun</p>' : '<p style="font-size:24px; line-height:1.4;">🔹 C = SECOND noun &nbsp;&nbsp; 🔹 M = FIRST noun</p>',
        on_finish: (data) => {
          let resp = data.response === 'c' ? 'NP1' : 'NP2';
          if (keyMapping === 'swapped') resp = resp === 'NP1' ? 'NP2' : 'NP1';
          const corr = (item.correct !== null) ? (resp === item.correct) : null;
          const demo = jsPsych.data.get().values().find(d => d.participant) || {};
          comprehensionData = {
            participant: demo.participant || '',
            auto_participant_id: autoParticipantID,
            age: demo.age || '',
            gender: demo.gender || '',
            education: demo.education || '',
            handedness: demo.handedness || '',
            native_language: demo.native_language || '',
            other_languages: demo.other_languages || '',
            list_type: listType,
            key_mapping: keyMapping,
            block_order: blockOrder,
            set_assignment: setAssignment,
            block: block,
            trial_num: trialNum,
            sentence: item.sentence,
            question: item.question,
            correct_answer: item.correct,
            response: resp,
            accuracy: corr,
            is_dual_task: true,
            rt_from_question: data.rt,
            digit_sequence: currentDigits ? currentDigits.join('') : null,
            item_type: item.type || 'main'
          };
          sendToGoogleSheets(comprehensionData);
          incrementCounter();
          if (isPractice) window.lastPractice = { correct: corr, correctAnswer: item.correct };
        }
      };
      
      const recallTrial = {
        type: jsPsychSurveyHtmlForm,
        html: `<div style="text-align:center;">
          <p style="font-size:28px; line-height:1.5;">Enter the 4 digits in the same order:</p>
          <input type="text" name="recall" pattern="[0-9]{4}" inputmode="numeric" placeholder="e.g., 5271" required class="recall-input" id="digitRecallInput" autofocus>
          <p style="margin-top:20px; font-size:20px;">Press Enter or click Submit</p>
          <script>
            (function() {
              var input = document.getElementById('digitRecallInput');
              if (input) { setTimeout(function() { input.focus(); }, 10); }
            })();
          <\/script>
        </div>`,
        on_finish: (data) => {
          const recalled = data.response.recall || '';
          const presented = currentDigits ? currentDigits.join('') : '';
          const recCorrect = (presented === recalled);
          if (comprehensionData) {
            const recallRow = { ...comprehensionData, recall_correct: recCorrect, recalled_digits: recalled, recall_rt: data.rt, is_recall_row: true };
            sendToGoogleSheets(recallRow);
          } else {
            sendToGoogleSheets({ trial_num: trialNum, block: block, recall_correct: recCorrect, recalled_digits: recalled, recall_rt: data.rt, is_recall_row: true, auto_participant_id: autoParticipantID });
          }
          if (isPractice) window.lastRecallCorrect = recCorrect;
        }
      };
      
      const blankEnd = { type: jsPsychHtmlKeyboardResponse, stimulus: '<div></div>', trial_duration: 300, choices: "NO_KEYS" };
      
      if (isPractice) {
        const recallFeedback = {
          type: jsPsychHtmlKeyboardResponse,
          stimulus: () => { const correct = window.lastRecallCorrect; return correct ? '<div class="feedback-digit">✓ Digit recall: correct</div>' : '<div class="feedback-digit">✗ Digit recall: incorrect</div>'; },
          trial_duration: 1000,
          choices: "NO_KEYS",
          on_finish: () => { window.lastRecallCorrect = null; }
        };
        return [digPres, blank1, fix, sent, ques, recallTrial, recallFeedback, blankEnd];
      } else {
        return [digPres, blank1, fix, sent, ques, recallTrial, blankEnd];
      }
    }
    
    // ==================== BUILD TIMELINE ====================
    let timeline = [];
    
    // Consent (redesigned card with researcher email)
    timeline.push({
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <div class="consent-card">
          <h3>PARTICIPANT INFORMATION AND CONSENT FORM</h3>
          <p>You are invited to participate in a research study on <strong>sentence comprehension</strong>.</p>
          <p>The task involves reading sentences and answering questions. The experiment will take approximately <strong>20 minutes</strong> to complete.</p>
          
          <p><strong>Participation is voluntary.</strong> You may stop the experiment and close your browser at any time without penalty. Any responses you have already submitted before exiting will still be stored, but you may request deletion afterward using your Participant ID (see below).</p>
          
          <p>This study involves no known risks beyond those encountered in everyday computer use. While there is no direct benefit to participants, the study may contribute to research on language processing.</p>
          
          <div class="highlight">
            <p><strong>No personal identifying information (such as your name or email address) will be collected.</strong> You will be asked to create a non‑identifying Participant ID of your choice (for example, <em>BlueTiger27</em>). Please do not use your real name. <strong>Keep this ID</strong> – you will need it if you later wish to request deletion of your data.</p>
          </div>
          
          <p>Your responses will be stored securely in a password‑protected Google Sheet accessible only to the researcher through an institutionally affiliated email account.</p>
          <p>After completing the experiment, you may request deletion of your data by emailing <strong>i.zeddari@um5r.ac.ma</strong> and providing your Participant ID.</p>
          <p>If you have any questions about this study, please contact: <strong>i.zeddari@um5r.ac.ma</strong></p>
          
          <p><strong>By continuing, you confirm that:</strong><br>
          • you are voluntarily agreeing to participate;<br>
          • you are at least 18 years old.</p>
          
          <div class="agreement">
            Do you agree to participate?<br>
            Press <span class="btn-prompt">C</span> for Yes &nbsp;&nbsp;&nbsp; Press <span class="btn-prompt">M</span> for No
          </div>
        </div>
      `,
      choices: ['c', 'm'],
      on_finish: (data) => {
        if (data.response !== 'c') {
          jsPsych.finishTrial();
          jsPsych.endExperiment('You have declined to participate. Thank you for your time.');
        }
      }
    });
    
    // Demographics (compact)
    timeline.push({
      type: jsPsychSurveyHtmlForm,
      preamble: '<h3 style="text-align:center;">Participant Information</h3>',
      html: `<div class="demographics-compact">
          <div class="form-group"><label>Participant ID (create a non‑identifying ID, e.g., BlueTiger27):</label><input type="text" name="participant" required placeholder="e.g., BlueTiger27"></div>
          <div class="form-group"><label>Age:</label><input type="number" name="age" required></div>
          <div class="form-group"><label>Gender:</label><select name="gender" required><option value="">--Select--</option><option>Female</option><option>Male</option><option>Non-binary</option></select></div>
          <div class="form-group"><label>Highest academic level:</label><input type="text" name="education" required placeholder="e.g., Bachelor, Master, PhD"></div>
          <div class="form-group"><label>Handedness:</label><select name="handedness" required><option value="">--Select--</option><option>Right-handed</option><option>Left-handed</option><option>Ambidextrous</option></select></div>
          <div class="form-group"><label>Native language:</label><input type="text" name="native_language" required placeholder="e.g., English, Arabic, French"></div>
          <div class="form-group full-width">
            <label>Other languages (select all):</label>
            <div class="checkbox-group">
              <label><input type="checkbox" name="lang_arabic" value="Arabic"> Arabic</label>
              <label><input type="checkbox" name="lang_moroccan_arabic" value="Moroccan Arabic"> Moroccan Arabic</label>
              <label><input type="checkbox" name="lang_amazigh" value="Amazigh"> Amazigh</label>
              <label><input type="checkbox" name="lang_french" value="French"> French</label>
              <label><input type="checkbox" name="lang_english" value="English"> English</label>
              <label><input type="checkbox" name="lang_spanish" value="Spanish"> Spanish</label>
              <label><input type="checkbox" name="lang_other_check" value="other"> Other</label>
            </div>
            <div class="other-specify" id="otherSpecifyDiv" style="display:none;"><label>Please specify:</label><input type="text" name="lang_other_text" placeholder="e.g., Italian, Portuguese"></div>
          </div>
        </div>
        <script>
          (function() { var otherCheck = document.querySelector('input[name="lang_other_check"]'); var otherDiv = document.getElementById('otherSpecifyDiv'); if (otherCheck) { otherCheck.addEventListener('change', function() { otherDiv.style.display = this.checked ? 'flex' : 'none'; }); } })();
        <\/script>`,
      on_finish: (data) => {
        let languages = [];
        if (data.response.lang_arabic) languages.push('Arabic');
        if (data.response.lang_moroccan_arabic) languages.push('Moroccan Arabic');
        if (data.response.lang_amazigh) languages.push('Amazigh');
        if (data.response.lang_french) languages.push('French');
        if (data.response.lang_english) languages.push('English');
        if (data.response.lang_spanish) languages.push('Spanish');
        if (data.response.lang_other_check) {
          if (data.response.lang_other_text) languages.push(`Other: ${data.response.lang_other_text}`);
          else languages.push('Other (unspecified)');
        }
        jsPsych.data.addProperties({
          participant: data.response.participant,
          auto_participant_id: autoParticipantID,
          age: data.response.age,
          gender: data.response.gender,
          education: data.response.education,
          handedness: data.response.handedness,
          native_language: data.response.native_language,
          other_languages: languages.join(', ')
        });
      }
    });
    
    timeline.push({ type: jsPsychCallFunction, func: () => { jsPsych.data.addProperties({ list_type: listType, key_mapping: keyMapping, block_order: blockOrder, set_assignment: setAssignment }); } });
    
    // General instructions
    timeline.push({ type: jsPsychHtmlKeyboardResponse, stimulus: `<div class="instruction-text"><h2>Instructions</h2><p>You will see a sentence for 5 seconds, then a question. Press <strong>C</strong> or <strong>M</strong>.</p><p>${(keyMapping === 'original') ? 'C = FIRST noun, M = SECOND noun' : 'C = SECOND noun, M = FIRST noun'}</p><p>The experiment has two parts. Each part starts with a short practice.</p><p>Press SPACE to begin.</p></div>`, choices: [' '] });
    
    timeline.push({ type: jsPsychCallFunction, func: () => createCounter() });
    
    // Baseline practice (no digits)
    timeline.push({ type: jsPsychHtmlKeyboardResponse, stimulus: '<div class="instruction-text" style="font-size:36px;">Part with sentences only – practice<br><br>Press SPACE</div>', choices: [' '] });
    for (let i = 0; i < practiceTrials.length; i++) {
      let comps = makeBaselineComponents(practiceTrials[i], i + 1, 'practice_baseline', true);
      let fb = { type: jsPsychHtmlKeyboardResponse, stimulus: () => { let last = window.lastPractice; if (!last) return ''; return last.correct ? '<div class="feedback-correct">✓ Correct!</div>' : `<div class="feedback-incorrect">✗ Correct answer: ${last.correctAnswer}</div>`; }, trial_duration: 1500, choices: "NO_KEYS" };
      timeline.push(...comps.slice(0, 3), fb, comps[3]);
    }
    
    function addBaselineBlock() {
      timeline.push({ type: jsPsychHtmlKeyboardResponse, stimulus: '<div class="instruction-text" style="font-size:36px;">Now the main sentences (no digits)<br><br>Press SPACE</div>', choices: [' '] });
      for (let i = 0; i < baselineSet.length; i++) {
        timeline.push(...makeBaselineComponents(baselineSet[i], i + 1, 'baseline_main', false));
      }
    }
    
    function addDualBlock() {
      timeline.push({ type: jsPsychHtmlKeyboardResponse, stimulus: '<div class="instruction-text" style="font-size:32px;">Part with digit memory task – practice<br><br>You will see 4 digits, then sentence, then answer, then type the digits.<br>After each trial you will see feedback for digit recall.<br><br>Press SPACE</div>', choices: [' '] });
      let practiceUsed = new Set();
      let practicePool = shuffleDigits([...digitSequences]);
      for (let i = 0; i < practiceTrials.length; i++) {
        let comps = makeDualComponents(practiceTrials[i], i + 1, 'dual_practice', practicePool, practiceUsed, true);
        timeline.push(...comps);
      }
      timeline.push({ type: jsPsychHtmlKeyboardResponse, stimulus: '<div class="instruction-text" style="font-size:36px;">Now the main sentences with digit memory task<br><br>Remember the digits, read the sentence, answer, then type the digits.<br><br>Press SPACE</div>', choices: [' '] });
      let mainUsed = new Set();
      let mainPool = shuffleDigits([...digitSequences]);
      for (let i = 0; i < dualSet.length; i++) {
        timeline.push(...makeDualComponents(dualSet[i], i + 1, 'dual_main', mainPool, mainUsed, false));
      }
    }
    
    if (blockOrder === 'baseline_first') {
      addBaselineBlock();
      addDualBlock();
    } else {
      addDualBlock();
      addBaselineBlock();
    }
    
    timeline.push({ type: jsPsychHtmlKeyboardResponse, stimulus: '<div style="font-size:48px; text-align:center; line-height:1.5; margin-top:30vh;">Experiment complete!<br><br>Thank you for participating.<br><br>You may close this window.</div>', choices: [' '] });
    
    const jsPsych = initJsPsych({ on_finish: () => { if (counterDiv) counterDiv.remove(); } });
    window.jsPsych = jsPsych;
    jsPsych.run(timeline);
  });
</script>
</body>
